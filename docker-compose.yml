version: '3.8'

services:

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    environment:
      POSTGRES_DB: microservices
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d microservices"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - microservices-net

  # Auth Service
  auth-service:
    build: ./services/auth
    container_name: auth-service
    environment:
      DATABASE_URL: postgresql://admin:password@postgres:5432/microservices
      
      SECRET_KEY: supersecretjwtkey12345
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - microservices-net
    restart: unless-stopped

  # Product Service
  product-service:
    build: ./services/product
    container_name: product-service
    environment:
      DATABASE_URL: postgresql://admin:password@postgres:5432/microservices
    ports:
      - "8002:8002"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - microservices-net
    restart: unless-stopped

  # Order Service (incident simulation target)
  order-service:
    build: ./services/order
    container_name: order-service
    environment:
      # NOTE: Change this to "wrong-host" to simulate the incident:
      # DATABASE_URL: postgresql://admin:password@postgres:5432/microservices
      DATABASE_URL: postgresql://admin:password@wrong-host:5432/microservices
      PRODUCT_SERVICE_URL: http://product-service:8002
    ports:
      - "8003:8003"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - microservices-net
    restart: unless-stopped

  # User Service
  user-service:
    build: ./services/user
    container_name: user-service
    environment:
      DATABASE_URL: postgresql://admin:password@postgres:5432/microservices
    ports:
      - "8004:8004"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - microservices-net
    restart: unless-stopped

  # Chat Service
  chat-service:
    build: ./services/chat
    container_name: chat-service
    environment:
      DATABASE_URL: postgresql://admin:password@postgres:5432/microservices
    ports:
      - "8005:8005"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - microservices-net
    restart: unless-stopped

  # Nginx Frontend & Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: nginx-frontend
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - auth-service
      - product-service
      - order-service
      - user-service
      - chat-service
    networks:
      - microservices-net
    restart: unless-stopped

  # Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    networks:
      - microservices-net
    restart: unless-stopped

  # Grafana
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - microservices-net
    restart: unless-stopped

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:

networks:
  microservices-net:
    driver: bridge
